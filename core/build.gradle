plugins {
    // 应用 NeoForge 插件，不需要写版本号（根项目已管理）
    id 'net.neoforged.moddev'
}

// 提取常用属性为局部变量，避免 DSL 语法冲突，提高可读性
def modId = property('mod_id')
def modName = property('mod_name')
def modVersion = property('mod_version')
def modGroupId = property('mod_group_id')
def modLicense = property('mod_license')
def neoVersion = property('neo_version')
def minecraftVersion = property('minecraft_version')
def minecraftVersionRange = property('minecraft_version_range')

version = modVersion
group = modGroupId

base {
    archivesName = modId
}

sourceSets.main.resources {
    // Include resources generated by data generators.
    srcDir('src/generated/resources')

    // Exclude common development only resources from finalized outputs
    exclude("**/*.bbmodel") // BlockBench project files
    exclude("src/generated/**/.cache") // datagen cache files
}

neoForge {
    // Specify the version of NeoForge to use.
    version = neoVersion

    // Default run configurations.
    runs {
        client {
            client()
            systemProperty 'neoforge.enabledGameTestNamespaces', modId
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', modId
        }

        // This run config launches GameTestServer and runs all registered gametests, then exits.
        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', modId
        }

        data {
            clientData()
            programArguments.addAll '--mod', modId, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        // applies to all the run configs above
        configureEach {
            systemProperty 'forge.logging.markers', 'REGISTRIES'
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        // 核心模块
        "${modId}" {
            sourceSet sourceSets.main
        }
        // 插件模块：运行时由 core 的 classpath 加载
        rpgcraftattributes {
            sourceSet project(':attributes').sourceSets.main
        }
        rpgcraftleveling {
            sourceSet project(':leveling').sourceSets.main
        }
        rpgcraftequipment {
            sourceSet project(':equipment').sourceSets.main
        }
        rpgcraftprofession {
            sourceSet project(':profession').sourceSets.main
        }
        rpgcraftprofessions {
            sourceSet project(':professions').sourceSets.main
        }
        rpgcraftclient {
            sourceSet project(':client').sourceSets.main
        }
        rpgcraftattributepoints {
            sourceSet project(':attributepoints').sourceSets.main
        }
        rpgcraftskills {
            sourceSet project(':skills').sourceSets.main
        }
        rpgcraftregion {
            sourceSet project(':region').sourceSets.main
        }
    }
}

configurations {
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    // 运行时加载所有插件模块（开发期间由 core 托管运行）
    runtimeOnly project(':attributes')
    runtimeOnly project(':leveling')
    runtimeOnly project(':equipment')
    runtimeOnly project(':profession')
    runtimeOnly project(':professions')
    runtimeOnly project(':client')
    runtimeOnly project(':attributepoints')
    runtimeOnly project(':skills')
    runtimeOnly project(':region')
    // PAL（Player Animation Library）依赖声明在 skills 模块（官方推荐 implementation），
    // 通过 runtimeOnly project(':skills') 传递到 core 的运行时 classpath，无需在此重复声明。

    // 单元测试（验证 core 内部纯逻辑：注册门面兜底、经验公式等，不依赖 Minecraft 运行时）
    testImplementation platform('org.junit:junit-bom:5.10.2')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    // slf4j 实现：NoOp* 兜底类用 LoggerFactory 记录 WARN，生产期由 MC 提供，测试期需自带
    testRuntimeOnly 'org.slf4j:slf4j-simple:2.0.13'
}

test {
    useJUnitPlatform()
}

var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            minecraft_version      : minecraftVersion,
            minecraft_version_range: minecraftVersionRange,
            neo_version            : neoVersion,
            mod_id                 : modId,
            mod_name               : modName,
            mod_license            : modLicense,
            mod_version            : modVersion,
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}

sourceSets.main.resources.srcDir generateModMetadata
neoForge.ideSyncTask generateModMetadata

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
