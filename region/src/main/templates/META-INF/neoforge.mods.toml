license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Berserker10086"
description='''
RPG Region Module - Polygonal regions that apply environmental attribute bonuses and penalties
to entities within their bounds (e.g. volcano region: fire resistance up, fire damage up, water/poison damage down).
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="rpgcraftcore"
    type="required"
    versionRange="[0.1.0,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="rpgcraftattributes"
    type="optional"
    versionRange="[0.1.0,)"
    ordering="AFTER"
    side="BOTH"
