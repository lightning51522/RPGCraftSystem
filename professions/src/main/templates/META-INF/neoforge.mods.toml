license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Berserker10086"
description='''
RPG Professions Module - Concrete profession classes (warrior, archer, etc.).
Registers all in-game professions to the profession framework.
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="rpgcraftcore"
    type="required"
    versionRange="[0.1.0,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="rpgcraftprofession"
    type="required"
    versionRange="[0.5.0,)"
    # 关键：必须 AFTER profession 模块，确保 ProfessionManager.init() 先执行
    ordering="AFTER"
    side="BOTH"
