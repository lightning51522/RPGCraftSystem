plugins {
    id 'net.neoforged.moddev'
}

def modId = property('mod_id')
def modName = property('mod_name')
def modVersion = property('mod_version')
def modGroupId = property('mod_group_id')
def modLicense = property('mod_license')

version = modVersion
group = modGroupId

base {
    archivesName = modId
}

sourceSets.main.resources {
    srcDir('src/generated/resources')
    exclude("**/*.bbmodel")
    exclude("src/generated/**/.cache")
}

neoForge {
    version = rootProject.property('neo_version')

    mods {
        "${modId}" {
            sourceSet sourceSets.main
        }
    }
}

configurations {
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    // 仅依赖 core：职业 ID 常量在 core.profession.api.ProfessionIds，
    // 职业注册中心通过 core.RPGSystems.getProfessionRegistry() 获取。
    // 运行时通过 neoforge.mods.toml 的 AFTER 依赖保证 rpgcraftprofession 引擎在本模块之前初始化。
    implementation project(':core')
}

var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            minecraft_version      : rootProject.property('minecraft_version'),
            minecraft_version_range: rootProject.property('minecraft_version_range'),
            neo_version            : rootProject.property('neo_version'),
            mod_id                 : modId,
            mod_name               : modName,
            mod_license            : modLicense,
            mod_version            : modVersion,
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}

sourceSets.main.resources.srcDir generateModMetadata
neoForge.ideSyncTask generateModMetadata

idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
